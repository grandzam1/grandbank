name: Deploy grandbank.chasericebms.org

on:
  push:
    branches:
      - main
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            APP_DIR=/home/root2/web/grandbank.chasericebms.org/public_html
            BRANCH="${{ github.ref_name }}"
            cd "$APP_DIR"
            chown -R root2:root2 "$APP_DIR"
            sudo -u root2 git fetch origin
            sudo -u root2 git reset --hard "origin/${BRANCH}"
            sudo -u root2 bash scripts/deploy.sh
